name: backend ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r foundation-skeleton/backend/requirements.txt
          pip install aiosqlite pytest pytest-asyncio anyio

      - name: run backend tests
        env:
          ENABLE_TELEMETRY: "false"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          PYTHONPATH: "./foundation-skeleton/backend"
        run: |
          python -m pytest -c pytest.ini foundation-skeleton/backend/tests -v
          